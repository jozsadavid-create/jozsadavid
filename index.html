<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.png" type="image/png">
  <meta name="description" content="Józsa Dávid. Writer, Photographer, Creative Director.">
  <title>Józsa Dávid</title>
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://www.jozsadavid.com/">
  <meta property="og:title"       content="Józsa Dávid">
  <meta property="og:description" content="Writer, Photographer, Creative Director.">
  <meta property="og:image"       content="https://www.jozsadavid.com/img/kibo/Exteriors/MOZSES_Neom_Mansions_Arrival.jpg">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:title"      content="Józsa Dávid">
  <meta name="twitter:description" content="Writer, Photographer, Creative Director.">
  <meta name="twitter:image"      content="https://www.jozsadavid.com/img/kibo/Exteriors/MOZSES_Neom_Mansions_Arrival.jpg">
  <link rel="stylesheet" href="style.css">
  <style>

    body { overflow: hidden; cursor: none; }
    @media (max-width: 700px) { body { overflow: auto; cursor: auto; } }

    .portals {
      display: flex;
      height: 100svh;
      width: 100vw;
    }

    .portal {
      flex: 1;
      min-width: 0;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: var(--gutter);
      padding-top: calc(var(--nav-h) + 2rem);
      transition:
        flex-grow 0.85s cubic-bezier(0.16, 1, 0.3, 1),
        background-color 0.5s var(--ease-std);
      text-decoration: none;
      color: inherit;
      border-right: 1px solid #ffffff08;
    }
    .portal:last-child { border-right: none; }

    .portals:has(.portal:hover) .portal          { flex-grow: 0.55; }
    .portals:has(.portal:hover) .portal:hover    { flex-grow: 1.9; }

    /* Background photos */
    .portal-bg {
      position: absolute;
      inset: -6%;
      background-size: cover;
      background-position: center;
      opacity: 0.11;
      transition:
        opacity 0.9s var(--ease-std),
        transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity;
      transform: scale(1.06) translate(0,0);
    }
    .portal:hover .portal-bg {
      opacity: 1;
      transform: scale(1.0) translate(0,0);
    }

    .portal-bg-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      transition: opacity 0.7s var(--ease-std);
    }
    .portal--nolka   .portal-bg-overlay { background: linear-gradient(160deg, rgba(10,15,20,0.82) 0%, rgba(6,8,6,0.91) 100%); }
    .portal--kibo    .portal-bg-overlay { background: linear-gradient(160deg, rgba(8,8,6,0.84) 0%, rgba(2,2,2,0.92) 100%); }
    .portal--writing .portal-bg-overlay { background: linear-gradient(160deg, rgba(14,10,6,0.80) 0%, rgba(8,6,4,0.91) 100%); }
    .portal:hover .portal-bg-overlay { opacity: 0.72; }

    .portal--writing { background: linear-gradient(160deg, #130e09 0%, #080806 100%); }
    .portal--nolka   { background: linear-gradient(160deg, #0a0f14 0%, #080806 100%); }
    .portal--kibo    { background: linear-gradient(160deg, #0c0c0a 0%, #020202 100%); }
    .portal--writing:hover { background: linear-gradient(160deg, #1e1408 0%, #0e0a06 100%); }
    .portal--nolka:hover   { background: linear-gradient(160deg, #0e161e 0%, #08100e 100%); }
    .portal--kibo:hover    { background: linear-gradient(160deg, #141412 0%, #040404 100%); }

    /* Top accent line */
    .portal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.5s var(--ease);
      z-index: 10;
    }
    .portal:hover::before { transform: scaleX(1); }
    .portal--writing::before { background: #c4a96a; }
    .portal--nolka::before   { background: #7aA8c4; }
    .portal--kibo::before    { background: #cac6be; }

    .portal-content {
      position: relative;
      z-index: 5;
      padding-bottom: clamp(2rem, 4vw, 3rem);
    }

    .portal-index {
      font-family: var(--font-label);
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      display: block;
      transition: color 0.3s;
    }
    .portal:hover .portal-index { color: var(--text-dim); }

    .portal-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 3.5vw, 3.2rem);
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 1rem;
      transition: transform 0.5s var(--ease);
      text-shadow: 0 2px 24px rgba(0,0,0,0.7);
    }
    .portal:hover .portal-title { transform: translateY(-4px); }

    .portal-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.75;
      max-width: 30ch;
      opacity: 0;
      transform: translateY(10px);
      transition:
        opacity 0.4s 0.05s var(--ease),
        transform 0.4s 0.05s var(--ease);
      margin-bottom: 1.75rem;
      text-shadow: 0 1px 12px rgba(0,0,0,0.8);
    }
    .portal:hover .portal-desc { opacity: 1; transform: none; }

    .portal-enter {
      font-family: var(--font-label);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      opacity: 0;
      transform: translateX(-8px);
      transition:
        opacity 0.35s 0.1s var(--ease),
        transform 0.35s 0.1s var(--ease),
        color 0.2s,
        gap 0.3s var(--ease);
    }
    .portal:hover .portal-enter { opacity: 1; transform: none; }
    .portal:hover .portal-enter:hover { color: var(--text); gap: 1rem; }

    .portal-enter-line {
      display: inline-block;
      width: 24px; height: 1px;
      background: currentColor;
      transition: width 0.3s var(--ease);
    }
    .portal:hover .portal-enter:hover .portal-enter-line { width: 36px; }

    /* Ghost name overlay */
    .index-name {
      position: fixed;
      top: 50%;
      left: var(--gutter);
      right: var(--gutter);
      transform: translateY(-50%);
      z-index: 5;
      pointer-events: none;
      user-select: none;
      transition: opacity 0.6s var(--ease-std);
    }
    body:has(.portal:hover) .index-name { opacity: 0; }
    .index-name__text {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 9.5vw, 10rem);
      font-weight: 300;
      font-style: italic;
      color: rgba(232, 227, 216, 0.09);
      line-height: 1;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }
    .index-name__sub {
      font-family: var(--font-label);
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      color: rgba(232, 227, 216, 0.15);
      margin-top: 1rem;
    }

    /* Large ghosted numbers */
    .portal-number-bg {
      position: absolute;
      top: calc(var(--nav-h) + 1.5rem);
      right: var(--gutter);
      font-family: var(--font-display);
      font-size: clamp(6rem, 14vw, 16rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1;
      pointer-events: none;
      user-select: none;
      transition: color 0.6s;
      z-index: 4;
    }
    /* Per-portal accent tint on numbers */
    .portal--nolka   .portal-number-bg { color: rgba(122, 168, 196, 0.06); }
    .portal--kibo    .portal-number-bg { color: rgba(202, 198, 190, 0.05); }
    .portal--writing .portal-number-bg { color: rgba(196, 169, 106, 0.06); }
    .portal--nolka:hover   .portal-number-bg { color: rgba(122, 168, 196, 0.13); }
    .portal--kibo:hover    .portal-number-bg { color: rgba(202, 198, 190, 0.11); }
    .portal--writing:hover .portal-number-bg { color: rgba(196, 169, 106, 0.13); }

    /* Ambient glow */
    .portal-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at var(--mx, 50%) var(--my, 80%),
        rgba(255,255,255,0.055) 0%,
        transparent 58%
      );
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
      z-index: 2;
    }
    .portal:hover .portal-glow { opacity: 1; }

    /* Entrance animation */
    @keyframes portal-reveal {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: none; }
    }
    .portal {
      opacity: 0;
      animation: portal-reveal 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .portal:nth-child(1) { animation-delay: 0.1s; }
    .portal:nth-child(2) { animation-delay: 0.22s; }
    .portal:nth-child(3) { animation-delay: 0.34s; }

    /* Letterbox bars */
    @keyframes bar-in { to { transform: translateY(0); } }
    .index-bar {
      position: fixed;
      left: 0; right: 0;
      height: clamp(22px, 3.2vh, 44px);
      background: #000;
      z-index: 400;
      pointer-events: none;
    }
    .index-bar--top {
      top: 0;
      transform: translateY(-100%);
      animation: bar-in 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }
    .index-bar--bottom {
      bottom: 0;
      transform: translateY(100%);
      animation: bar-in 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    /* Custom cursor */
    .index-cursor {
      position: fixed;
      width: 7px; height: 7px;
      border-radius: 50%;
      border: 1px solid rgba(240,236,229,0.5);
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%,-50%);
      opacity: 0;
      transition: opacity 0.3s, width 0.22s, height 0.22s, border-color 0.22s;
    }
    .index-cursor.is-visible  { opacity: 1; }
    .index-cursor.is-hovering { width: 24px; height: 24px; border-color: rgba(240,236,229,0.25); }

    /* Scroll hint — own keyframe so translateX(-50%) is preserved */
    @keyframes hint-reveal {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes tick-down {
      0%, 100% { transform: translateY(-4px); opacity: 0; }
      50%       { transform: translateY(0); opacity: 1; }
    }
    .index-hint {
      position: fixed;
      bottom: clamp(2.2rem, 5vh, 4rem);
      left: 50%;
      z-index: 10;
      font-family: var(--font-label);
      font-size: 0.56rem;
      letter-spacing: 0.3em;
      color: rgba(232,227,216,0.2);
      text-transform: uppercase;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      opacity: 0;
      animation: hint-reveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1.2s both;
    }
    .index-hint__tick {
      width: 1px; height: 20px;
      background: rgba(232,227,216,0.22);
      animation: tick-down 2.2s ease-in-out infinite;
    }

    /* Fade-to-black click transition */
    .index-fade {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 0.45s cubic-bezier(0.4, 0, 1, 1);
    }
    .index-fade.is-fading { opacity: 1; pointer-events: all; }

    /* Hint hides after first portal hover */
    .index-hint.is-hidden {
      opacity: 0 !important;
      animation: none !important;   /* cancel fill-mode so transition can take over */
      transition: opacity 0.8s ease !important;
    }

    /* Mobile */
    @media (max-width: 700px) {
      .portals { flex-direction: column; height: auto; }
      .portal  { min-height: 45svh; flex: none; opacity: 1; animation: none; }
      .portals:has(.portal:hover) .portal       { flex-grow: 1; }
      .portals:has(.portal:hover) .portal:hover { flex-grow: 1; }
      .portal-desc  { opacity: 1; transform: none; }
      .portal-enter { opacity: 1; transform: none; }
      .index-name   { display: none; }
      .index-hint   { display: none; }
      .index-bar    { display: none; }
    }

  </style>
</head>
<body>

  <!-- Fade-to-black overlay for portal transitions -->
  <div class="index-fade" id="idx-fade"></div>

  <!-- Letterbox bar (bottom only — keeps cinematic frame without blocking nav) -->
  <div class="index-bar index-bar--bottom" aria-hidden="true"></div>

  <!-- Custom cursor -->
  <div class="index-cursor" id="idx-cursor" aria-hidden="true"></div>

  <!-- Navigation -->
  <nav class="site-nav" id="site-nav">
    <a href="index.html" class="nav-logo">Józsa Dávid</a>
    <div class="nav-links" id="nav-links">
      <a href="writing.html">Writing</a>
      <a href="nolka.html">Nolka</a>
      <a href="kibo.html">Kibo Visuals</a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Ghost name spanning all panels -->
  <div class="index-name" aria-hidden="true">
    <div class="index-name__text">Józsa Dávid</div>
    <div class="index-name__sub">Writer &middot; Photographer &middot; Creative Director</div>
  </div>

  <!-- Three portal panels -->
  <main class="portals">

    <a href="nolka.html" class="portal portal--nolka">
      <div class="portal-bg" style="background-image:url('img/nolka/wild/Pink_Pelican_Eye.jpg');background-position:center center"></div>
      <div class="portal-bg-overlay"></div>
      <div class="portal-glow"></div>
      <div class="portal-number-bg" aria-hidden="true">01</div>
      <div class="portal-content">
        <span class="portal-index">01 · Photography</span>
        <h2 class="portal-title">Nolka<br>Photography</h2>
        <span class="portal-enter"><span class="portal-enter-line"></span>Enter</span>
      </div>
    </a>

    <a href="kibo.html" class="portal portal--kibo">
      <div class="portal-bg" style="background-image:url('img/kibo/Exteriors/MOZSES_Neom_Mansions_Arrival.jpg');background-position:center 40%"></div>
      <div class="portal-bg-overlay"></div>
      <div class="portal-glow"></div>
      <div class="portal-number-bg" aria-hidden="true">02</div>
      <div class="portal-content">
        <span class="portal-index">02 · CGI &amp; Art Direction</span>
        <h2 class="portal-title">Kibo<br>Visuals</h2>
        <span class="portal-enter"><span class="portal-enter-line"></span>Enter</span>
      </div>
    </a>

    <a href="writing.html" class="portal portal--writing">
      <div class="portal-bg" style="background-image:url('img/kibo/Interiors/MASONITE_Spooky02.jpg');background-position:center 35%"></div>
      <div class="portal-bg-overlay"></div>
      <div class="portal-glow"></div>
      <div class="portal-number-bg" aria-hidden="true">03</div>
      <div class="portal-content">
        <span class="portal-index">03 · Writing</span>
        <h2 class="portal-title">Fiction &amp;<br>Narratives</h2>
        <span class="portal-enter"><span class="portal-enter-line"></span>Enter</span>
      </div>
    </a>

  </main>

  <!-- Hover hint -->
  <div class="index-hint" id="idx-hint" aria-hidden="true">
    <div class="index-hint__tick"></div>
    <span>hover to explore</span>
  </div>

  <script src="js/ambient.js" defer></script>
  <script>
    (function () {
      'use strict';

      /* ── Audio context — fully unlocked via silent-buffer trick ── */
      /* Chrome requires actual audio to be scheduled within a valid gesture
         (click / pointerdown / keydown) before Web Audio is usable.
         Calling resume() alone is NOT enough — we must play a silent 1-sample
         buffer. After that, audioCtx.state stays 'running' for the page life. */
      var AudioCtx = window.AudioContext || window.webkitAudioContext;
      var audioCtx = null;

      function unlockAudio() {
        if (!AudioCtx || audioCtx) return;
        try {
          audioCtx = new AudioCtx();
          var buf = audioCtx.createBuffer(1, 1, 22050);
          var src = audioCtx.createBufferSource();
          src.buffer = buf;
          src.connect(audioCtx.destination);
          src.start(0); /* scheduling real audio fully unlocks the context */
        } catch(e) { audioCtx = null; }
      }
      ['pointerdown', 'keydown', 'touchstart'].forEach(function(ev) {
        document.addEventListener(ev, unlockAudio, { once: true, passive: true });
      });

      /* Only call fn if context is running — no silent failures */
      function withCtx(fn) {
        if (audioCtx && audioCtx.state === 'running') fn(audioCtx);
      }

      /* ── Portal hover: low airy breath ── */
      function playHover() {
        withCtx(function(ctx) {
          try {
            var t   = ctx.currentTime;
            var len = ctx.sampleRate * 0.38;
            var buf = ctx.createBuffer(1, len, ctx.sampleRate);
            var d   = buf.getChannelData(0);
            for (var i = 0; i < len; i++) {
              d[i] = (Math.random() * 2 - 1) * Math.pow(Math.sin(Math.PI * i / len), 1.4) * 0.12;
            }
            var src  = ctx.createBufferSource(); src.buffer = buf;
            var lp   = ctx.createBiquadFilter(); lp.type = 'lowpass';  lp.frequency.value = 420;
            var hp   = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 90;
            var gain = ctx.createGain();
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.42, t + 0.08);
            gain.gain.linearRampToValueAtTime(0,    t + 0.38);
            src.connect(lp); lp.connect(hp); hp.connect(gain); gain.connect(ctx.destination);
            src.start(t);
          } catch(e) {}
        });
      }

      /* ── Portal click: slow atmospheric swell — low, felt not heard ── */
      function playEnter() {
        withCtx(function(ctx) {
          try {
            var t = ctx.currentTime;

            /* Sub bass sine — slow swell from 58 → 36 Hz */
            var osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(58, t);
            osc.frequency.linearRampToValueAtTime(36, t + 1.2);
            var g1 = ctx.createGain();
            g1.gain.setValueAtTime(0,    t);
            g1.gain.linearRampToValueAtTime(0.28, t + 0.18);
            g1.gain.linearRampToValueAtTime(0.12, t + 0.7);
            g1.gain.linearRampToValueAtTime(0,    t + 1.2);
            osc.connect(g1); g1.connect(ctx.destination);
            osc.start(t); osc.stop(t + 1.3);

            /* Low room breath — dense noise filtered down to ~120 Hz */
            var len = Math.floor(ctx.sampleRate * 1.3);
            var buf = ctx.createBuffer(1, len, ctx.sampleRate);
            var d   = buf.getChannelData(0);
            for (var i = 0; i < len; i++) { d[i] = Math.random() * 2 - 1; }
            var src = ctx.createBufferSource(); src.buffer = buf;
            var lp  = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 140;
            lp.Q.value = 0.4;
            var g2 = ctx.createGain();
            g2.gain.setValueAtTime(0,    t);
            g2.gain.linearRampToValueAtTime(0.20, t + 0.12);
            g2.gain.linearRampToValueAtTime(0.08, t + 0.75);
            g2.gain.linearRampToValueAtTime(0,    t + 1.3);
            src.connect(lp); lp.connect(g2); g2.connect(ctx.destination);
            src.start(t);
          } catch(e) {}
        });
      }

      /* ── Nav link hover: crisp thin tick ── */
      function playTick() {
        withCtx(function(ctx) {
          try {
            var t   = ctx.currentTime;
            var osc = ctx.createOscillator(); osc.type = 'triangle';
            osc.frequency.value = 3200;
            var g = ctx.createGain();
            g.gain.setValueAtTime(0.08, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(t); osc.stop(t + 0.06);
          } catch(e) {}
        });
      }

      /* ── Wire up sounds + fade transition + hint hide ── */
      var portals  = document.querySelectorAll('.portal');
      var fadeEl   = document.getElementById('idx-fade');
      var hintEl   = document.getElementById('idx-hint');
      var hovered  = null;
      var hintGone = false;

      portals.forEach(function (p) {
        /* Sound on hover */
        p.addEventListener('mouseenter', function () {
          if (hovered !== p) { hovered = p; playHover(); }
          /* Auto-hide hint on first portal hover */
          if (!hintGone && hintEl) {
            hintGone = true;
            hintEl.classList.add('is-hidden');
          }
        });
        p.addEventListener('mouseleave', function () { hovered = null; });

        /* Fade-to-black on click, then navigate */
        p.addEventListener('click', function (e) {
          var href = p.getAttribute('href');
          if (!href || e.ctrlKey || e.metaKey || e.shiftKey) return;
          e.preventDefault();
          playEnter();
          fadeEl.classList.add('is-fading');
          setTimeout(function () { window.location.href = href; }, 460);
        });
      });
      document.querySelectorAll('.nav-links a').forEach(function (a) {
        a.addEventListener('mouseenter', playTick);
      });

      /* ── Ambient glow + parallax per portal ── */

      /* ── Ambient glow + parallax per portal ── */
      portals.forEach(function (p) {
        p.addEventListener('mousemove', function (e) {
          var r = p.getBoundingClientRect();
          var xp = ((e.clientX - r.left) / r.width  * 100).toFixed(1) + '%';
          var yp = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';
          p.style.setProperty('--mx', xp);
          p.style.setProperty('--my', yp);
          var bg = p.querySelector('.portal-bg');
          if (bg) {
            var dx = ((e.clientX - r.left) / r.width  - 0.5) * -14;
            var dy = ((e.clientY - r.top)  / r.height - 0.5) * -10;
            bg.style.transform = 'scale(1.0) translate(' + dx + 'px,' + dy + 'px)';
          }
        });
        p.addEventListener('mouseleave', function () {
          var bg = p.querySelector('.portal-bg');
          if (bg) bg.style.transform = 'scale(1.06) translate(0,0)';
